<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shrine of Knowledge</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { dark: '#07090E', gold: '#EBB44D', panel: '#11141D', panelBorder: '#232838' },
          fontFamily: { serif: ['"Playfair Display"', 'serif'], sans: ['Inter', 'sans-serif'] },
          animation: {
            'shake': 'shake 0.4s cubic-bezier(.36,.07,.19,.97) both',
            'fade-in': 'fadeIn 0.6s ease-out forwards',
            'glow-pulse': 'glowPulse 3s infinite alternate'
          },
          keyframes: {
            shake: {
              '10%, 90%': { transform: 'translate3d(-2px, 0, 0)' },
              '20%, 80%': { transform: 'translate3d(4px, 0, 0)' },
              '30%, 50%, 70%': { transform: 'translate3d(-6px, 0, 0)' },
              '40%, 60%': { transform: 'translate3d(6px, 0, 0)' }
            },
            fadeIn: { '0%': { opacity: '0', transform: 'scale(0.98)' }, '100%': { opacity: '1', transform: 'scale(1)' } },
            glowPulse: { '0%': { boxShadow: '0 0 20px rgba(235,180,77,.1)' }, '100%': { boxShadow: '0 0 40px rgba(235,180,77,.3)' } }
          }
        }
      }
    };
  </script>
  <link href="style.css" rel="stylesheet">
</head>
<body class="font-sans antialiased min-h-screen flex flex-col h-screen overflow-hidden">
  <header class="border-b border-panelBorder bg-dark/80 backdrop-blur-md z-20 flex-shrink-0">
    <div class="max-w-[1400px] mx-auto p-4 sm:p-6 flex justify-between items-center">
      <div class="flex items-center gap-4">
        <div class="w-2 h-2 rounded-full bg-gold animate-glow-pulse"></div>
        <h1 class="text-gold font-serif text-2xl tracking-widest uppercase">The Shrine</h1>
      </div>
      <div class="flex items-center gap-8 bg-panel border border-panelBorder rounded-full px-6 py-2 shadow-lg">
        <div class="flex flex-col items-center">
          <span class="text-[10px] uppercase tracking-widest text-gray-500 font-bold">Player Level</span>
          <span id="level-counter" class="text-white font-serif text-xl font-bold">1</span>
        </div>
        <div class="w-px h-8 bg-panelBorder"></div>
        <div class="flex flex-col items-center">
          <span class="text-[10px] uppercase tracking-widest text-gray-500 font-bold">Total XP</span>
          <span id="xp-counter" class="text-gold font-serif text-xl font-bold transition-all duration-300">0</span>
        </div>
      </div>
    </div>
  </header>

  <main id="main-content" class="flex-grow flex items-center justify-center p-4 sm:p-8 w-full max-w-[1400px] mx-auto transition-content h-full overflow-hidden">
    <div class="w-full h-full grid grid-cols-1 lg:grid-cols-12 gap-8 lg:gap-12 animate-fade-in pb-8">
      <div class="lg:col-span-7 h-full flex flex-col overflow-y-auto pr-4 sm:pr-8 pt-4">
        <div class="mb-10">
          <p class="text-gold text-sm tracking-[0.3em] uppercase mb-4 font-bold flex items-center gap-3"><span class="w-8 h-px bg-gold"></span> Framework No. <span id="fw-id">--</span></p>
          <h2 id="fw-title" class="font-serif text-5xl sm:text-7xl text-white mb-8 glow-text leading-tight">...</h2>
          <blockquote id="fw-quote" class="text-2xl sm:text-3xl font-serif text-gray-400 italic border-l-4 border-gold/50 pl-8 py-2 leading-relaxed">...</blockquote>
        </div>
        <div class="text-gray-300 text-xl sm:text-2xl" id="fw-description"></div>
        <div class="mt-8 mb-12 bg-panel border border-panelBorder p-8 rounded-2xl shadow-xl relative overflow-hidden">
          <div class="absolute left-0 top-0 w-1 h-full bg-gold"></div>
          <h3 class="text-gray-500 text-xs tracking-widest uppercase mb-3 font-bold">Core Takeaway</h3>
          <p id="fw-takeaway" class="text-xl text-white font-serif leading-relaxed">...</p>
        </div>
      </div>

      <div class="lg:col-span-5 h-full flex flex-col justify-center pt-4">
        <div id="trial-section" class="w-full bg-panel border border-panelBorder rounded-3xl p-8 sm:p-12 shadow-2xl relative overflow-hidden transition-all duration-500">
          <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-gold to-transparent opacity-30"></div>
          <div class="mb-10">
            <h3 class="font-serif text-3xl text-white mb-2">The Trial</h3>
            <p class="text-gray-400 text-sm uppercase tracking-wider">Select the correct truth to advance</p>
          </div>
          <p id="fw-question" class="text-2xl mb-10 font-medium text-white leading-snug"></p>
          <div id="fw-options" class="flex flex-col gap-4"></div>
        </div>

        <div id="reward-section" class="hide w-full bg-[#0a1410] border-2 border-green-500/50 rounded-3xl p-8 sm:p-12 shadow-[0_0_50px_rgba(34,197,94,0.1)] text-center flex-col justify-center items-center">
          <div class="w-20 h-20 rounded-full bg-green-500/20 flex items-center justify-center mb-6 mx-auto">✓</div>
          <h3 class="font-serif text-4xl text-green-400 mb-2">Quest Complete</h3>
          <p class="text-green-200/70 text-lg mb-12">+50 Experience Points Awarded</p>
          <div class="flex flex-col gap-4 w-full">
            <button id="next-quest-btn" class="w-full bg-gold text-dark font-bold text-xl py-5 rounded-xl hover:bg-yellow-400 transition-all duration-300 shadow-lg">Begin Next Quest ➔</button>
            <button id="download-pdf-btn" class="w-full bg-transparent border-2 border-panelBorder text-gray-400 hover:text-white hover:border-gray-500 font-semibold text-lg py-4 rounded-xl transition-all duration-300">Download PDF Artifact</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
